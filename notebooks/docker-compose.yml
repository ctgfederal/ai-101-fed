# AI-101-Fed — Docker Compose for local development
# Usage: docker-compose up -d
# Then open http://localhost:8888
# To dump work: docker-compose run --rm ai-101-fed dump-work

version: "3.8"

services:
  ai-101-fed:
    build: .
    container_name: ai-101-fed
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./identities:/app/identities
      - ./.env:/app/.env
      - ./vendor:/app/vendor
      - ./work-output:/app/output
    environment:
      - JUPYTER_ENABLE_LAB=yes
    restart: unless-stopped

  dump:
    build: .
    container_name: ai-101-fed-dump
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./identities:/app/identities
      - ./work-output:/app/output
    command: dump-work